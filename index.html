<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio pessoal demostrando o uso do HTML 5">
    <title>HMLT 5 Didatico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Bem vindo HMLT5</h1>
        <h2>Guias de tags basicas</h2>
    </header>
    <nav>
        <ul>
            <li><a href="#texto">Texto</a></li>
            <li><a href="#listas">Listas</a></li>
            <li><a href="#tabelas">Tabelas</a></li>
            <li><a href="#formularios">Formularios</a></li>
        </ul>
    </nav>
    <main>
        <section id="texto">
            <h2>Formatação de texto</h2>
            <p>
                Este é um <strong>paragrafo</strong> de exemplo.
                Aqui temos um texto em <em>itálico</em> para ênfase.
            </p>
            <p>
                Texto <mark>marcado</mark> para destaque visual, codigo inline: <code>System.out,printIn</code>
                e abreviação: <abbr title="Hypertext Markup Language">HTML</abbr>
            </p>
        </section>
    </main>
</body>
</html>
