<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <h1>Célula que abrange duas colunas</h1>
    <h2>Para fazer uma célula abranger mais de uma coluna, use um atributo colspan</h2>
    <table style="width: 100%;">
        <tr>
            <th colspan="2">Nome</th>
            <th>Idade</th>
        </tr>
        <tr>
            <td>Nana</td>
            <td>Banana</td>
            <td>190</td>
        </tr>
        <tr>
            <td>Jeferson</td>
            <td>Pinto</td>
            <td>98</td>
        </tr>
    </table>
    <table style="width: 100%;">
        <tr>
            <th>Nome</th>
            <th>Lucas</th>
        </tr>
        <tr>
            <th rowspan="2">Telefone</th>
            <td>555-1234</td>
        </tr>
        <tr>
            <td>555-5678</td>
        </tr>
    </table>
</body>
</html>
